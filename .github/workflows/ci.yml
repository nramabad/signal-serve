name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout signal-serve
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          target: aarch64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross || true

      - name: Clippy
        run: cargo clippy -p signal-serve --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test -p signal-serve --lib

      - name: Build (native)
        run: cargo build -p signal-serve --release

      - name: Cross-compile aarch64-musl
        run: cross build -p signal-serve --release --target aarch64-unknown-linux-musl

      - name: Smoke test (--help)
        run: ./target/release/signal-serve --help

      - name: Upload aarch64-musl binary
        uses: actions/upload-artifact@v4
        with:
          name: signal-serve-aarch64-musl
          path: target/aarch64-unknown-linux-musl/release/signal-serve
          retention-days: 7